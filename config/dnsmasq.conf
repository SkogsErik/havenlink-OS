# HavenLink OS - dnsmasq configuration
# /etc/dnsmasq.conf
#
# DHCP server for WiFi Access Point

# Interface
interface=wlan0

# Bind to interface only
bind-interfaces

# Don't read /etc/resolv.conf
no-resolv

# DNS server (local)
# For local-only mesh, we don't need external DNS
# But we need something for clients to not complain
address=/#/#

# DHCP range
# 10.0.0.10 - 10.0.0.50 (41 clients)
dhcp-range=10.0.0.10,10.0.0.50,255.255.255.0,12h

# Gateway
dhcp-option=option:router,10.0.0.1

# DNS (use local, can add more for caching)
dhcp-option=option:dns-server,10.0.0.1

# Domain
domain=mesh.local

# Lease file
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases

# Don't poll /etc/resolv.conf for changes
no-poll

# Log DHCP
log-dhcp

# Enable DNSSEC (optional)
# dnssec

# Cache size
cache-size=1000
