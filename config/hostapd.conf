# HavenLink OS - hostapd configuration
# /etc/hostapd.conf
#
# WiFi Access Point configuration
# Generate your own WiFi credentials in setup

interface=wlan0
driver=nl80211

# WiFi network name (SSID)
ssid=HavenLink-Mesh

# Channel (1-11 for 2.4GHz, 36-165 for 5GHz)
channel=6

# Operating mode (g = 2.4GHz, a = 5GHz, n = 2.4/5GHz)
hw_mode=g

# Enable WPA2
wpa=2
# Passphrase is derived from the USB key at runtime by havenlink-tools wifi start
# and written to /run/hostapd.psk (tmpfs, mode 0600). Never stored on disk.
wpa_passphrase_file=/run/hostapd.psk

# WPA2-Personal
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# Disable WPS
wps_state=0

# Hide SSID (optional - set to 1 to hide)
ignore_broadcast_ssid=0

# Enable 802.11n
ieee80211n=1

# Enable WMM
wmm_enabled=1

# Country code
country_code=US

# Maximum number of clients
max_num_sta=20

# Isolation (prevents clients from communicating directly)
# Set to 1 to isolate clients (recommended for security)
isolate_clients=1
