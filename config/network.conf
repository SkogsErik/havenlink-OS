# HavenLink OS - Network Configuration
# /etc/havenlink/network.conf
#
# WiFi and network settings

# WiFi Access Point Mode
# Set to "ap" to enable WiFi AP (default: ap)
WIFI_MODE=ap

# WiFi Client Isolation
# Set to 1 to isolate WiFi clients from each other
# Set to 0 to allow mesh networking between clients
# Note: Requires hostapd isolation_clients=1 as well
ISOLATE_CLIENTS=0

# Ethernet Mode  
# "dhcp" - DHCP client (default)
# "static" - Static IP
# "none" - No ethernet
ETH_MODE=dhcp

# Static IP configuration (if ETH_MODE=static)
# ETH_IP=192.168.1.100
# ETH_NETMASK=255.255.255.0
# ETH_GATEWAY=192.168.1.1

# WiFi Network (AP mode)
# SSID - WiFi network name
WIFI_SSID=HavenLink-Mesh

# WiFi Channel (1-11 for 2.4GHz, 36-165 for 5GHz)
WIFI_CHANNEL=6

# WiFi Band
# "g" - 2.4GHz only
# "a" - 5GHz only  
# "n" - 2.4GHz and 5GHz
WIFI_BAND=g

# Local mesh network
# This is the network for WiFi clients and mesh
MESH_NETWORK=10.0.0.0
MESH_NETMASK=255.255.255.0
MESH_IP=10.0.0.1

# DHCP range
DHCP_START=10.0.0.10
DHCP_END=10.0.0.50
DHCP_LEASE=12h

# Tor Configuration
# Set to 1 to enable Tor for internet connectivity
USE_TOR=0
