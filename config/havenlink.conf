# HavenLink OS - Default Configuration
# /etc/havenlink/havenlink.conf

[general]
version = 0.1.0
data_dir = /var/lib/havenlink
log_dir = /var/log/havenlink
log_level = INFO

[network]
# Port range for peer connections
port_min = 9001
port_max = 9010

# Bind address (127.0.0.1 for localhost only)
bind_address = 127.0.0.1

# Allow inbound from local network
allow_local_network = true

[tor]
enabled = true
control_port = 9051
socks_port = 9050
use_tor = true

[security]
# Key storage: auto, usb, hardware
key_storage = auto

# Session timeout (seconds)
session_timeout = 3600

# Maximum peers
max_peers = 50

# Auto-accept new contacts
auto_accept = false

[relay]
enabled = false
max_storage_mb = 100
relay_enabled = false

[logging]
facility = daemon
max_size_mb = 10
max_files = 5

[ui]
# Console UI theme
theme = dark

# Show timestamps
show_timestamps = true
